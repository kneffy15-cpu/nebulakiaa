<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Nebula again
    |  han  |</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #interact-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            cursor: pointer; transition: 1s;
        }
        #interact-overlay h2 { font-size: 1.1rem; letter-spacing: 4px; color: #fff; font-weight: 300; margin-bottom: 10px; }
        #ui-layer {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: #fff; pointer-events: none; z-index: 10; opacity: 0; transition: 2s;
        }
        #ui-layer.show { opacity: 0.6; }
    </style>
</head>
<body>

    <div id="interact-overlay" onclick="startGalaxy()">
        <h2>Soft Nebula of kiaa 2.0</h2>
        <p style="color:#666; font-size:0.7rem;">click to enter | han</p>
    </div>

    <div id="ui-layer">
    </div>

    <audio id="bg-music" src="lin.mp3" loop></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, star, photoGroup, nebulaGroup, dysonGroup, asteroidBelt, comet;
        let isStarted = false;
        const clock = new THREE.Clock();
        const loader = new THREE.TextureLoader();

        const createParticleTex = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64,64,0, 64,64,64);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
            return new THREE.CanvasTexture(canvas);
        };
        const particleTex = createParticleTex();

        function startGalaxy() {
            if (isStarted) return;
            isStarted = true;
            document.getElementById('interact-overlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('interact-overlay').style.display = 'none'; 
                document.getElementById('ui-layer').classList.add('show'); 
            }, 1000);
            const audio = document.getElementById('bg-music');
            audio.play().catch(() => console.log("Audio play blocked"));
            init();
            animate();
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 35000);
            camera.position.set(0, 500, 1300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.1;

            // 1. MATAHARI LAVA LAMP (Goyang & Gak Menyatu)
            const lavaShader = {
                uniforms: { time: { value: 0 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float time;
                    varying vec2 vUv;
                    void main() {
                        float t = time * 0.4;
                        vec2 uv = vUv * 3.0 - 1.5;
                        
                        // Logika cairan lava: gelombang yang saling tumpang tindih
                        float r = sin(uv.x * 2.5 + t) + cos(uv.y * 2.0 - t * 0.4);
                        r += sin((uv.x + uv.y) * 1.5 + t * 0.8);
                        
                        float g = sin(uv.x * 1.8 - t * 0.9) + sin(uv.y * 2.2 + t);
                        float b = cos(uv.x + uv.y + t * 0.6) + sin(t * 0.3);

                        vec3 color = vec3(
                            sin(r * 0.5 + t) * 0.5 + 0.5, 
                            cos(g * 0.6 + t * 0.5) * 0.5 + 0.5, 
                            sin(b * 0.7 + t * 0.8) * 0.5 + 0.5
                        );
                        
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            };
            star = new THREE.Mesh(new THREE.SphereGeometry(45, 64, 64), new THREE.ShaderMaterial(lavaShader));
            scene.add(star);

            // 2. SHIELD
            const shield = new THREE.Mesh(
                new THREE.SphereGeometry(55, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.06 })
            );
            scene.add(shield);

            // 3. CINCIN KIAÀ
            const ringCanvas = document.createElement('canvas');
            ringCanvas.width = 2048; ringCanvas.height = 128;
            const rCtx = ringCanvas.getContext('2d');
            rCtx.font = 'Bold 60px Arial'; rCtx.fillStyle = 'white';
            rCtx.textAlign = 'center';
            for(let i=0; i<8; i++) rCtx.fillText(" —kiaaà ✨", i * 256 + 128, 80);
            const ringTex = new THREE.CanvasTexture(ringCanvas);
            dysonGroup = new THREE.Mesh(
                new THREE.CylinderGeometry(95, 95, 18, 64, 1, true),
                new THREE.MeshBasicMaterial({ map: ringTex, transparent: true, side: THREE.DoubleSide })
            );
            scene.add(dysonGroup);

            // 4. NEBULA
            nebulaGroup = new THREE.Group();
            scene.add(nebulaGroup);
            const nebCols = [0xff0000, 0xff00ff, 0xff0099];
            for(let i=0; i<400; i++) {
                const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: particleTex, color: nebCols[i%3], transparent: true, opacity: 0.10, blending: THREE.AdditiveBlending }));
                const a = Math.random() * Math.PI * 2;
                const r = 200 + Math.random() * 950;
                s.position.set(Math.cos(a)*r, (Math.random()-0.5)*550, Math.sin(a)*r);
                s.scale.set(280, 280, 1);
                nebulaGroup.add(s);
            }

            // 5. ORBIT & FOTO
            photoGroup = new THREE.Group();
            scene.add(photoGroup);
            const paths = Array.from({length: 9}, (_, i) => `img${i+1}.jpg`);
            for(let i=0; i<10; i++) {
                const radius = 220 + (i * 70);
                const orbitLine = new THREE.Mesh(
                    new THREE.TorusGeometry(radius, 0.4, 16, 100),
                    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 })
                );
                orbitLine.rotation.x = Math.PI/2;
                scene.add(orbitLine);

                for(let j=0; j<9; j++) {
                    loader.load(paths[j], (tex) => {
                        const s = new THREE.Sprite(new THREE.SpriteMaterial({map:tex}));
                        s.scale.set(32, 32, 1);
                        const angle = Math.random()*Math.PI*2;
                        s.userData = { a: angle, r: radius, s: 0.0008 + Math.random()*0.0016 };
                        photoGroup.add(s);
                    });
                }
            }

            // 6. ASTEROID (Ekor di Belakang)
            asteroidBelt = new THREE.Group();
            scene.add(asteroidBelt);
            for(let i=0; i<380; i++) {
                const g = new THREE.Group();
                const head = new THREE.Mesh(new THREE.IcosahedronGeometry(Math.random()*2.8, 0), new THREE.MeshStandardMaterial({color:0x999999}));
                const tailG = new THREE.BufferGeometry();
                const tp = [];
                for(let j=0; j<45; j++) tp.push(0, 0, j*1.8);
                tailG.setAttribute('position', new THREE.Float32BufferAttribute(tp, 3));
                const tail = new THREE.Points(tailG, new THREE.PointsMaterial({map:particleTex, color:0xffffff, size:3, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending}));
                g.add(head); g.add(tail);
                const r = 1100 + Math.random()*600;
                const th = Math.random()*Math.PI*2;
                g.position.set(Math.cos(th)*r, (Math.random()-0.5)*180, Math.sin(th)*r);
                g.rotation.y = -th + Math.PI; 
                g.userData = { th: th, r: r, s: 0.0012 + Math.random()*0.0022 };
                asteroidBelt.add(g);
            }

            // 7. KOMET (Ekor Belakang)
            comet = new THREE.Group();
            const ch = new THREE.Mesh(new THREE.SphereGeometry(20, 16, 16), new THREE.MeshBasicMaterial({color:0xffffff}));
            const ctG = new THREE.BufferGeometry();
            const ctp = [];
            for(let j=0; j<200; j++) ctp.push(0, 0, j*5.5); 
            ctG.setAttribute('position', new THREE.Float32BufferAttribute(ctp, 3));
            const ct = new THREE.Points(ctG, new THREE.PointsMaterial({map:particleTex, color:0xffffff, size:14, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending}));
            comet.add(ch); comet.add(ct);
            scene.add(comet);
            resetComet();

            // 8. BINTANG
            const starG = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<65000; i++) starPos.push((Math.random()-0.5)*18000, (Math.random()-0.5)*18000, (Math.random()-0.5)*18000);
            starG.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starG, new THREE.PointsMaterial({color:0xffffff, size:1.5})));

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene.add(new THREE.PointLight(0xffffff, 2, 5000));
        }

        function resetComet() {
            const dist = 8000;
            const th = Math.random()*Math.PI*2;
            comet.position.set(Math.cos(th)*dist, (Math.random()-0.5)*3500, Math.sin(th)*dist);
            comet.lookAt(0,0,0);
            comet.rotateY(Math.PI);
            comet.userData = { active: true, s: 45 + Math.random()*50 };
        }

        function animate() {
            requestAnimationFrame(animate);
            const d = clock.getElapsedTime();
            if(star) star.material.uniforms.time.value = d;
            if(dysonGroup) dysonGroup.rotation.y += 0.01;
            
            if(comet && comet.userData.active) {
                comet.translateZ(-comet.userData.s);
                if(comet.position.length() > 10000) {
                    comet.userData.active = false;
                    setTimeout(resetComet, 2000 + Math.random()*4000);
                }
            }

            asteroidBelt.children.forEach(m => {
                m.userData.th += m.userData.s;
                m.position.x = Math.cos(m.userData.th) * m.userData.r;
                m.position.z = Math.sin(m.userData.th) * m.userData.r;
                m.rotation.y = -m.userData.th + Math.PI; 
            });

            photoGroup.children.forEach(p => {
                p.userData.a += p.userData.s;
                p.position.set(Math.cos(p.userData.a)*p.userData.r, Math.sin(d*0.35 + p.userData.a)*20, Math.sin(p.userData.a)*p.userData.r);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
