<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curved Dyson & Soft Nebula — Kiaa</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #interact-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            cursor: pointer; transition: 1s;
        }
        #interact-overlay h2 { font-size: 1.1rem; letter-spacing: 4px; color: #fff; font-weight: 300; }
        #interact-overlay p { color:#444; font-size:0.7rem; margin-top:10px; }
        
        #ui-layer {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: #fff; pointer-events: none; z-index: 10; opacity: 0; transition: 2s;
        }
        #ui-layer.show { opacity: 0.6; }
    </style>
</head>
<body>

    <div id="interact-overlay" onclick="startGalaxy()">
        <h2>Soft Nebula For you</h2>
        <p>pencet hehe  | han</p>
    </div>

    <div id="ui-layer">
        <p>Soft Nebula of —kiaaà✨</p>
    </div>

    <audio id="bg-music" src="lin.mp3" loop></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, star, photoGroup, dysonGroup, nebulaGroup;
        let isStarted = false;

        function startGalaxy() {
            if (isStarted) return;
            isStarted = true;
            document.getElementById('interact-overlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('interact-overlay').style.display = 'none'; 
                document.getElementById('ui-layer').classList.add('show'); 
            }, 1000);
            document.getElementById('bg-music').play();
            init();
            animate();
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; 
            controls.autoRotateSpeed = 0.5;

            // 1. MATAHARI
            star = new THREE.Mesh(
                new THREE.SphereGeometry(6, 64, 64),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            scene.add(star);

            // Soft Light Glow
            scene.add(new THREE.PointLight(0x0085FF, 15, 70));
            scene.add(new THREE.PointLight(0xFF00F6, 15, 70));
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            // 2. NEBULA (AWAN KOSMIK) - Dibuat Lebih Kalem & Tetap Permanent
            nebulaGroup = new THREE.Group();
            scene.add(nebulaGroup);
            const nebColors = [0x0085FF, 0xFF00F6, 0x00FFBB, 0x5500FF, 0xFF3300];
            
            for(let i=0; i<60; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                const grad = ctx.createRadialGradient(128,128,0, 128,128,128);
                // Dibuat lebih transparan di tengah (0.2) biar nggak terlalu jreng
                grad.addColorStop(0, 'rgba(255,255,255,0.2)');
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0,0,256,256);

                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ 
                    color: nebColors[i % nebColors.length],
                    map: tex, transparent: true, opacity: 0.5, // Opacity diturunkan
                    depthWrite: false, blending: THREE.AdditiveBlending 
                });
                
                const cloud = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), mat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 8 + Math.random() * 32;
                cloud.position.set(Math.cos(angle)*dist, (Math.random()-0.5)*25, Math.sin(angle)*dist);
                nebulaGroup.add(cloud);
            }

            // 3. FOTO ORBIT
            photoGroup = new THREE.Group();
            scene.add(photoGroup);
            const loader = new THREE.TextureLoader();
            const paths = ['img1.jpg', 'img2.jpg', 'img3.jpg', 'img4.jpg'];
            for(let i=0; i<30; i++) {
                loader.load(paths[i % 4], (tex) => {
                    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 30 + Math.random() * 12;
                    sprite.position.set(Math.cos(angle)*radius, (Math.random()-0.5)*20, Math.sin(angle)*radius);
                    sprite.scale.set(2.2, 2.2, 1);
                    sprite.userData = { angle: angle, radius: radius, speed: 0.001 + Math.random()*0.002 };
                    photoGroup.add(sprite);
                });
            }

            // 4. DYSON SPHERE (TEKS MELENGKUNG/3D) - Fixed Logic
            dysonGroup = new THREE.Group();
            scene.add(dysonGroup);

            // Buat bola Dyson-nya dulu (Sphere transparan tipis)
            const dysonShellMat = new THREE.MeshPhongMaterial({
                color: 0xaa00ff,
                transparent: true,
                opacity: 0.1,
                shininess: 100,
                side: THREE.DoubleSide
            });
            const dysonShell = new THREE.Mesh(new THREE.SphereGeometry(9, 32, 32), dysonShellMat);
            dysonGroup.add(dysonShell);

            // Buat Teks Melengkung Mengelilingi Bola (Pakai technique "Teks dalam Canvas sebagai Texture Spherical")
            const textStr = "kiaa";
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 2048; // Lebar canvas besar biar teksnya nggak pecah
            canvas.height = 256;
            ctx.font = 'Bold 80px sans-serif'; 
            ctx.fillStyle = '#ffccff'; // Pink muda estetik
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            
            // Repeat teks di canvas biar penuh muter
            const textRepeat = 10;
            const textWidth = canvas.width / textRepeat;
            for(let j=0; j<textRepeat; j++){
                ctx.fillText(textStr, (j + 0.5) * textWidth, canvas.height / 2);
            }

            const tex = new THREE.CanvasTexture(canvas);
            // Pakai silinder tipis yang dilengkungin mengikuti radius dyson shell
            const textGeom = new THREE.CylinderGeometry(9.1, 9.1, 2.5, 64, 1, true); // true = openEnded (bolong atas bawah)
            const textMat = new THREE.MeshBasicMaterial({ 
                map: tex, 
                transparent: true, 
                opacity: 0.9,
                side: THREE.DoubleSide 
            });
            const textMesh = new THREE.Mesh(textGeom, textMat);
            // Miringkan silinder teks biar estetik
            textMesh.rotation.x = Math.PI / 8;
            dysonGroup.add(textMesh);

            // Stars Background
            const stars = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<4000; i++) starPos.push((Math.random()-0.5)*500, (Math.random()-0.5)*500, (Math.random()-0.5)*500);
            stars.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(stars, new THREE.PointsMaterial({color: 0xffffff, size: 0.12})));
        }

        function animate() {
            requestAnimationFrame(animate);
            if(dysonGroup) dysonGroup.rotation.y += 0.003; // Putar pelan Dyson Sphere
            if(star) star.scale.setScalar(1 + Math.sin(Date.now()*0.002)*0.05);

            // UPDATE NEBULA AGAR TETAP TERLIHAT (Billboard Mode Permanent)
            if(nebulaGroup) {
                nebulaGroup.children.forEach(c => {
                    c.quaternion.copy(camera.quaternion); // Lock-on kamera
                });
            }

            if(photoGroup) {
                photoGroup.children.forEach(p => {
                    p.userData.angle += p.userData.speed;
                    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
                    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
